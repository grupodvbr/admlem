<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>REQUISIÇÕES VILLA</title>

<style>

:root{
--cor-azul:#007bff;
--cor-vermelho:#dc3545;
--cor-cinza:#f4f6fb;
--cor-verde:#28a745;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--cor-cinza);
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#fff;
border-bottom:1px solid #e5e7eb;
}

header img{
height:36px;
flex-shrink:0;
}

header h1{
margin:0;
font-size:14px;
font-weight:700;
line-height:1.2;
}

/* FILTROS */

.filtros{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:10px;
background:#fff;
border-bottom:1px solid #e5e7eb;
}

.filtros input,
.filtros select,
.filtros button{
flex:1 1 calc(50% - 8px);
min-width:120px;
padding:8px;
font-size:12px;
border-radius:6px;
border:1px solid #ccc;
}

.filtros button{
background:var(--cor-azul);
color:#fff;
border:none;
font-weight:700;
}

/* ALERTA */

.alerta{
position:fixed;
top:15px;
right:15px;
background:var(--cor-verde);
color:#fff;
padding:10px 18px;
border-radius:8px;
display:none;
z-index:9999;
font-size:13px;
}

/* LOADING */

#overlay-carregando{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(255,255,255,.9);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9998;
}

#overlay-carregando img{
width:80px;
margin-bottom:10px;
}

#overlay-carregando p{
font-size:16px;
font-weight:700;
color:#444;
}

/* TABELA RESPONSIVA */

.table-container{
width:100%;
overflow-x:auto;
}

table{
min-width:750px;
width:100%;
border-collapse:collapse;
background:#fff;
font-size:12px;
}

thead{
background:var(--cor-azul);
color:#fff;
}

th,td{
padding:8px 6px;
border:1px solid #ddd;
text-align:center;
white-space:nowrap;
}

select.status{
padding:4px;
font-size:12px;
}

/* BOTÕES FLUTUANTES */

#menu-solicitantes,
#relatorio{

position:fixed;
right:15px;

border:none;
border-radius:40px;

padding:12px 16px;
font-size:13px;
font-weight:700;

color:#fff;
cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,.25);
}

#menu-solicitantes{
bottom:80px;
background:var(--cor-azul);
}

#relatorio{
bottom:20px;
background:var(--cor-verde);
}

/* LISTA SOLICITANTES */

#lista-solicitantes{
position:fixed;
bottom:140px;
right:15px;
background:#fff;
border-radius:10px;
border:1px solid #ddd;
max-height:260px;
width:220px;
overflow-y:auto;
display:none;
padding:10px;
font-size:13px;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

#lista-solicitantes div{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

#lista-solicitantes div:hover{
background:#f4f4f4;
}

</style>
</head>

<body>

<header>
<img src="https://static.wixstatic.com/media/d830b0_8cec50a98bbf4775814dbfa5386585e8~mv2.png">
<h1>REQUISIÇÕES VILLA GOURMET / CHURRASCADA</h1>
</header>

<div id="overlay-carregando">
<img src="https://static.wixstatic.com/media/d830b0_8cec50a98bbf4775814dbfa5386585e8~mv2.png">
<p>Carregando dados...</p>
</div>

<div class="filtros">

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<input type="text" id="filtroItem" placeholder="Item ou Observação">
<input type="text" id="filtroSolicitante" placeholder="Solicitante">

<select id="filtroStatus">
<option value="PENDENTE" selected>PENDENTE</option>
<option value="TODOS">TODOS</option>
<option value="COMPRADO">COMPRADO</option>
<option value="NO CARRINHO">NO CARRINHO</option>
<option value="NEGADO">NEGADO</option>
<option value="ENTREGUE">ENTREGUE</option>
<option value="SEM ESTOQUE">SEM ESTOQUE</option>
</select>

<button onclick="filtrarRequisicoes()">🔍 Filtrar</button>
<button onclick="liquidarMassa('ENTREGUE')">📦 ENTREGUE</button>

</div>

<div class="alerta" id="alertaStatus"></div>

<div class="table-container">
<table>

<thead>
<tr>
<th>Data</th>
<th>Item</th>
<th>Qtd</th>
<th>Un</th>
<th>Setor</th>
<th>Solicitante</th>
<th>Obs</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabelaRequisicoes"></tbody>

</table>
</div>

<button id="menu-solicitantes" onclick="toggleSolicitantes()">👤 Solicitantes</button>

<div id="lista-solicitantes"></div>

<button id="relatorio" onclick="gerarRelatorio()">📤 Relatório</button>

<script>

const endpoint='https://script.google.com/macros/s/AKfycbzGSRFYD8CvYHNvrbn9-I3nuLfH_a_wFni6dTQl1KMSb-vbtH89-yJmAxB3hrpt4pY3/exec'

let dadosRequisicoes=[]

/* DEFINIR PADRÃO 3 DIAS */

function definirPeriodoPadrao(){

const hoje=new Date()

const inicio=new Date()

inicio.setDate(hoje.getDate()-3)

document.getElementById("dataInicio").value=inicio.toISOString().slice(0,10)

document.getElementById("dataFim").value=hoje.toISOString().slice(0,10)

}

/* CARREGAR */

async function carregarRequisicoes(){

document.getElementById("overlay-carregando").style.display="flex"

const res=await fetch(`${endpoint}?acao=ler`)

dadosRequisicoes=await res.json()

filtrarRequisicoes()

document.getElementById("overlay-carregando").style.display="none"

}

/* FORMATAR DATA */

function formatarDataHora(data){

if(!data) return ""

const d=new Date(data)

const dia=String(d.getDate()).padStart(2,'0')
const mes=String(d.getMonth()+1).padStart(2,'0')
const ano=d.getFullYear()

const h=String(d.getHours()).padStart(2,'0')
const m=String(d.getMinutes()).padStart(2,'0')

return `${dia}/${mes}/${ano} ${h}:${m}`

}

/* FILTRO */

function filtrarRequisicoes(){

const tabela=document.getElementById("tabelaRequisicoes")

tabela.innerHTML=""

const dataInicio=document.getElementById("dataInicio").value

const dataFim=document.getElementById("dataFim").value

const filtroItem=document.getElementById("filtroItem").value.toLowerCase()

const filtroSolicitante=document.getElementById("filtroSolicitante").value.toLowerCase()

const filtroStatus=document.getElementById("filtroStatus").value

dadosRequisicoes.forEach(item=>{

const data=item.dataHora?.split(" ")[0]||""

if(dataInicio && data<dataInicio) return
if(dataFim && data>dataFim) return

if(filtroItem && !item.item.toLowerCase().includes(filtroItem)) return
if(filtroSolicitante && !item.solicitante.toLowerCase().includes(filtroSolicitante)) return

if(filtroStatus!=="TODOS" && item.status!==filtroStatus && filtroStatus!=="PENDENTE") return

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${formatarDataHora(item.dataHora)}</td>
<td>${item.item}</td>
<td>${item.qtd}</td>
<td>${item.unidade}</td>
<td>${item.setor}</td>
<td>${item.solicitante}</td>
<td>${item.observacoes}</td>

<td>

<select class="status" onchange="atualizarStatus(${item.index},this.value)">

<option value="PENDENTE">PENDENTE</option>
<option value="COMPRADO">COMPRADO</option>
<option value="NO CARRINHO">NO CARRINHO</option>
<option value="NEGADO">NEGADO</option>
<option value="ENTREGUE">ENTREGUE</option>
<option value="SEM ESTOQUE">SEM ESTOQUE</option>

</select>

</td>
`

tabela.appendChild(tr)

})

}

/* STATUS */

async function atualizarStatus(index,status){

mostrarAlerta("Atualizando...")

await fetch(endpoint,{
method:'POST',
body:JSON.stringify({acao:'atualizarStatus',index,status})
})

mostrarAlerta("Atualizado")

}

/* ALERTA */

function mostrarAlerta(msg){

const a=document.getElementById("alertaStatus")

a.innerText=msg

a.style.display="block"

setTimeout(()=>a.style.display="none",2000)

}

/* SOLICITANTES */

function toggleSolicitantes(){

const lista=document.getElementById("lista-solicitantes")

if(lista.style.display==="block"){
lista.style.display="none"
return
}

const nomes=[...new Set(dadosRequisicoes.map(r=>r.solicitante).filter(Boolean))]

lista.innerHTML=nomes.map(n=>`<div onclick="filtrarPorSolicitante('${n}')">${n}</div>`).join("")

lista.style.display="block"

}

function filtrarPorSolicitante(nome){

document.getElementById("filtroSolicitante").value=nome

filtrarRequisicoes()

document.getElementById("lista-solicitantes").style.display="none"

}

/* RELATÓRIO */

function gerarRelatorio(){

const linhas=[...document.querySelectorAll("#tabelaRequisicoes tr")]

let html="<h2>Relatório Requisições</h2><table border='1'>"

linhas.forEach(l=>{

html+="<tr>"+[...l.children].slice(0,7).map(c=>`<td>${c.innerText}</td>`).join("")+"</tr>"

})

html+="</table>"

const w=window.open()

w.document.write(html)

}

/* INICIAR */

definirPeriodoPadrao()

carregarRequisicoes()

</script>

</body>
</html>
